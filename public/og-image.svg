<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="bgAccent" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0a0d18" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgAccent2" cx="15%" cy="85%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0a0d18" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0d18"/>
  <rect width="1200" height="630" fill="url(#bgAccent)"/>
  <rect width="1200" height="630" fill="url(#bgAccent2)"/>

  <!-- Subtle grid lines for visual texture -->
  <g stroke="#232a4a" stroke-width="1" opacity="0.3">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="550" x2="1200" y2="550"/>
  </g>

  <!-- Brand mark -->
  <rect x="100" y="170" width="120" height="120" rx="22" ry="22" fill="url(#markGrad)"/>
  <text
    x="160"
    y="266"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="80"
    font-weight="800"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="-2"
  >D</text>

  <!-- Eyebrow -->
  <text
    x="100"
    y="370"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="22"
    font-weight="600"
    fill="#a78bfa"
    letter-spacing="3"
  >COMMANDER DECK BUILDER</text>

  <!-- Wordmark -->
  <text
    x="100"
    y="460"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="96"
    font-weight="800"
    fill="url(#textGrad)"
    letter-spacing="-3"
  >Deckify</text>

  <!-- Tagline -->
  <text
    x="100"
    y="525"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="30"
    font-weight="500"
    fill="#a0a8c0"
    letter-spacing="-0.5"
  >Build optimized decks from the cards you own.</text>
</svg>
